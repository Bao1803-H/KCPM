services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bicap-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      JIRA_BASE_URL: ${JIRA_BASE_URL}
      JIRA_EMAIL: ${JIRA_EMAIL}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN}
      JIRA_PROJECT_KEY: ${JIRA_PROJECT_KEY}
      JIRA_ISSUE_TYPE: ${JIRA_ISSUE_TYPE:-Bug}
      JIRA_STATUS_BUG_LOGGED: ${JIRA_STATUS_BUG_LOGGED:-TO DO}
      JIRA_STATUS_IN_PROGRESS: ${JIRA_STATUS_IN_PROGRESS:-IN PROGRESS}
      JIRA_STATUS_READY_FOR_RETEST: ${JIRA_STATUS_READY_FOR_RETEST:-READY FOR TEST}
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  jenkins_home:
